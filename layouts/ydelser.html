{{ define "main" }}
{{ partial "side-hoved.html" . }}

<section class="s-papir">
  <div class="wrap">
    <div class="kerne">
      <p>{{ hugo.Data.ydelser.kerne | markdownify }}</p>
    </div>
    <ul class="kontoplan">
      {{ range hugo.Data.ydelser.liste }}
      <li id="{{ .anker }}">
        <div class="linje">
          <a class="titel" href="{{ (site.GetPage "/ydelser").RelPermalink }}{{ .anker }}/">{{ .titel }}</a>
          <span class="leder"></span>
          <span class="note">{{ .note }}</span>
        </div>
        <p class="beskrivelse">{{ .beskrivelse }} <a class="mere-inline" href="{{ (site.GetPage "/ydelser").RelPermalink }}{{ .anker }}/">Læs mere →</a></p>
      </li>
      {{ end }}
    </ul>
  </div>
</section>

{{ partial "faq.html" (dict "baggrund" "" "nr" "FAQ") }}
{{ end }}
