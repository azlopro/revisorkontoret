{{ define "main" }}

    <p class="eyebrow"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format ":date_long" }}</time></p>
    <h1>{{ .Title }}</h1>
  </div>
</div>

<section>
  <div class="wrap">
    <div class="prosa">

    </div>
  </div>
</section>
{{ end }}
